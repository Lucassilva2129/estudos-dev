<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="caixa">

        <h1>Calculador de IMC</h1>

        Digite sua altura:
        <div>
            <input type="number" id="altura" placeholder="Digite a altura em cm">
        </div>
        Digite o seu peso:
        <div>
        <input type="number" id="peso" placeholder="Digite o peso em kg">
        </div>
        <button type="button" id="botao">Calcular</button>

        <div id="resultado">Resultado</div>

    </div>

    <script src="script.js"></script>
</body>

</html>
