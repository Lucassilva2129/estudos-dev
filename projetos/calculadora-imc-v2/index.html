<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de IMC</title>
</head>
<body>
    <h1>Calculador de IMC</h1>

    Digite sua altura:
    <input type="number" id="altura" placeholder="Digite a altura em cm">
    Digite o seu peso:
    <input type="number" id="peso" placeholder="Digite o peso em kg">
    <button type="button" id="botao">Calcular</button>

    <div id="resultado">Resultado</div>

    <script src="script.js"></script>

</body>
</html>
